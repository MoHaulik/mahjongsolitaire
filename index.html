<script type="module">
import * as THREE from 'three';
// ─── Clap to Close (NXT/Care mandatory) ───────────────────────────
let clapStart = 0;
const CLAP_DIST = 0.15, CLAP_TIME = 6000;
function checkClap(ctrls, exitFn){
  if (ctrls.length < 2){ clapStart = 0; return; }
  const c1 = ctrls[0], c2 = ctrls[1];
  if (c1.position.lengthSq() === 0 && c2.position.lengthSq() === 0){ clapStart = 0; return; }
  if (c1.position.distanceTo(c2.position) <= CLAP_DIST){
    if (!clapStart) clapStart = Date.now();
    else if (Date.now() - clapStart >= CLAP_TIME){ exitFn(); clapStart = 0; }
  } else clapStart = 0;
}
// ─── Controller Select – Single-Arm Mode (NXT/Care required) ──────
const SELECT_TIME = 4000, HOLD_TIME = 3000;
let isControllerSelection = false;
let activeController = null;
let ctrlHoldStart = {};
let selectionStart = 0;
function processControllerSelection(){
  if (!isControllerSelection || !controllers.length) return;
  const elapsed = (clock.getElapsedTime() - selectionStart) * 1000;
  let bestY = -Infinity, bestIdx = -1;
  controllers.forEach((c, i) => {
    if (c.visible && c.position.lengthSq() > 0 && c.position.y > bestY){
      bestY = c.position.y; bestIdx = i;
    }
  });
  if (bestIdx >= 0){
    const c = controllers[bestIdx];
    const inFront = c.position.z > -0.8 && c.position.z < -0.3 && Math.abs(c.position.x) < 0.3;
    if (inFront){
      if (!ctrlHoldStart[bestIdx]) ctrlHoldStart[bestIdx] = clock.getElapsedTime();
      if ((clock.getElapsedTime() - ctrlHoldStart[bestIdx]) * 1000 >= HOLD_TIME){
        return confirmController(bestIdx);
      }
    } else ctrlHoldStart[bestIdx] = null;
  }
  if (elapsed > SELECT_TIME) confirmController(bestIdx >= 0 ? bestIdx : 0);
}
function confirmController(idx){
  isControllerSelection = false;
  setActive(controllers[idx]);
  triggerConfetti(controllers[idx]);
  tone(880, 0.18, 'triangle', 0.10);
  setTimeout(() => tone(1320, 0.22, 'triangle', 0.10), 80);
  startGame();
}
// ─── Confetti ─────────────────────────────────────────────────────
let confetti = [];
const CONFETTI_COLORS = [0xff44aa, 0x44aaff, 0xffdd44, 0x44ff88, 0xaa88ff, 0xff8844, 0xffffff, 0x66ddff];
function triggerConfetti(ctrl){
  const origin = new THREE.Vector3(); ctrl.getWorldPosition(origin);
  for (let i = 0; i < 60; i++){
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(0.018, 0.018),
      new THREE.MeshBasicMaterial({ color: CONFETTI_COLORS[i % CONFETTI_COLORS.length], side: THREE.DoubleSide, transparent: true, depthWrite: false })
    );
    m.position.copy(origin);
    m.userData.vel = new THREE.Vector3((Math.random()-0.5)*1.6, Math.random()*1.8+0.8, (Math.random()-0.5)*1.6);
    m.userData.rot = new THREE.Vector3(Math.random()*8, Math.random()*8, Math.random()*8);
    m.userData.life = 1.8;
    scene.add(m); confetti.push(m);
  }
}
function triggerWinConfetti(){
  for (let i = 0; i < 220; i++){
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(0.024, 0.024),
      new THREE.MeshBasicMaterial({ color: CONFETTI_COLORS[i % CONFETTI_COLORS.length], side: THREE.DoubleSide, transparent: true, depthWrite: false })
    );
    m.position.set((Math.random()-0.5)*2.6, 2.5+Math.random()*0.8, -2.0 + (Math.random()-0.5)*1.0);
    m.userData.vel = new THREE.Vector3((Math.random()-0.5)*1.4, Math.random()*0.3-0.5, (Math.random()-0.5)*1.4);
    m.userData.rot = new THREE.Vector3(Math.random()*8, Math.random()*8, Math.random()*8);
    m.userData.life = 4.0;
    scene.add(m); confetti.push(m);
  }
}
function updateConfetti(dt){
  confetti = confetti.filter(p => {
    p.userData.life -= dt;
    if (p.userData.life <= 0){ scene.remove(p); p.geometry.dispose(); p.material.dispose(); return false; }
    p.position.addScaledVector(p.userData.vel, dt);
    p.userData.vel.y -= 1.6 * dt;
    p.rotation.x += p.userData.rot.x * dt;
    p.rotation.y += p.userData.rot.y * dt;
    p.material.opacity = Math.min(1, p.userData.life);
    return true;
  });
}
// ─── Tiles & Suits (36 types × 4 = 144 tiles) ─────────────────────
const TW = 0.13, TH = 0.17, TD = 0.038;
const SUITS = [
  { syms:['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏'], body:0xc03030, tint:'#fff5f5', border:'#a02020' },
  { syms:['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘'], body:0x1a8040, tint:'#f0fff2', border:'#0e6028' },
  { syms:['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡'], body:0x1a50c0, tint:'#f0f4ff', border:'#0e3890' },
  { syms:['🀀','🀁','🀂','🀃','🀄','🀅','🀆'],            body:0xb07000, tint:'#fffaee', border:'#805000' },
  { syms:['🌸','❄️'],                                  body:0x8844aa, tint:'#faeeff', border:'#602080' }
];
const ALL_TYPES = [];
SUITS.forEach((s, si) => s.syms.forEach(sym => ALL_TYPES.push({ sym, si })));
const LAYOUT = [
  ...Array.from({length:12}, (_,i)=>[i*2+4, 0,0]),
  ...Array.from({length: 8}, (_,i)=>[i*2+8, 2,0]),
  ...Array.from({length:10}, (_,i)=>[i*2+6, 4,0]),
  ...Array.from({length:12}, (_,i)=>[i*2+4, 6,0]),
  [2,7,0], [28,7,0], [30,7,0],
  ...Array.from({length:12}, (_,i)=>[i*2+4, 8,0]),
  ...Array.from({length:10}, (_,i)=>[i*2+6,10,0]),
  ...Array.from({length: 8}, (_,i)=>[i*2+8,12,0]),
  ...Array.from({length:12}, (_,i)=>[i*2+4,14,0]),
  ...Array.from({length:6}, (_,i)=>[i*2+10, 2,1]),
  ...Array.from({length:6}, (_,i)=>[i*2+10, 4,1]),
  ...Array.from({length:6}, (_,i)=>[i*2+10, 6,1]),
  ...Array.from({length:6}, (_,i)=>[i*2+10, 8,1]),
  ...Array.from({length:6}, (_,i)=>[i*2+10,10,1]),
  ...Array.from({length:6}, (_,i)=>[i*2+10,12,1]),
  ...Array.from({length:4}, (_,i)=>[i*2+12, 4,2]),
  ...Array.from({length:4}, (_,i)=>[i*2+12, 6,2]),
  ...Array.from({length:4}, (_,i)=>[i*2+12, 8,2]),
  ...Array.from({length:4}, (_,i)=>[i*2+12,10,2]),
  ...Array.from({length:2}, (_,i)=>[i*2+14, 6,3]),
  ...Array.from({length:2}, (_,i)=>[i*2+14, 8,3]),
  [15,7,4]
];
function isFreeIn(p, set){
  const cx = p[0], cy = p[1], l = p[2];
  for (const q of set){
    if (q === p) continue;
    if (q[2] === l + 1 && Math.abs(q[0]-cx) < 2 && Math.abs(q[1]-cy) < 2) return false;
  }
  let left = false, right = false;
  for (const q of set){
    if (q === p || q[2] !== l) continue;
    if (Math.abs(q[1]-cy) >= 2) continue;
    if (q[0] === cx - 2) left = true;
    if (q[0] === cx + 2) right = true;
  }
  return !left || !right;
}
function generateRemovalOrder(){
  for (let attempt = 0; attempt < 400; attempt++){
    const remaining = LAYOUT.slice();
    const order = []; let stuck = false;
    while (remaining.length){
      const free = remaining.filter(p => isFreeIn(p, remaining));
      if (free.length < 2){ stuck = true; break; }
      const p1 = free[Math.floor(Math.random() * free.length)];
      let p2; do { p2 = free[Math.floor(Math.random() * free.length)]; } while (p2 === p1);
      order.push(p1, p2);
      remaining.splice(remaining.indexOf(p1), 1);
      remaining.splice(remaining.indexOf(p2), 1);
    }
    if (!stuck) return order;
  }
  console.warn('Solvable layout: max attempts exceeded, using shuffled fallback');
  return LAYOUT.slice().sort(() => Math.random() - 0.5);
}
// ─── Globals ──────────────────────────────────────────────────────
let scene, camera, renderer, raycaster, clock, xrSession;
let controllers = [], rayLine, reticle, hoveredTile = null;
let rift, stars, hud, winPanel, audio;
let state = { tiles: [], selected: [], score: 0, gameOver: false, locked: false };
let winShownAt = 0;
init();
function init(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 100);
  raycaster = new THREE.Raycaster();
  clock = new THREE.Clock();
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  renderer.xr.enabled = true;
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);
  // NXT/Care AR lighting baseline (ambient ≥ 1.5)
  scene.add(new THREE.AmbientLight(0xffffff, 1.6));
  const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(1,4,2); scene.add(dl);
  const dl2 = new THREE.DirectionalLight(0x88aaff, 0.5); dl2.position.set(-2,1,-1); scene.add(dl2);
  createRift(); createStars(); buildHUD(); buildWinPanel(); initAudio();
  document.getElementById('start-btn').addEventListener('click', startXR);
  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}
// ─── Backdrop ─────────────────────────────────────────────────────
function createRift(){
  const mat = new THREE.ShaderMaterial({
    transparent:true, blending:THREE.AdditiveBlending, side:THREE.DoubleSide, depthWrite:false,
    uniforms:{ time:{value:0}, c1:{value:new THREE.Color(0x6644ff)}, c2:{value:new THREE.Color(0x44ccff)} },
    vertexShader:`varying vec2 vUv; uniform float time;
      void main(){ vUv=uv; vec3 p=position; float d=length(uv-.5);
        p.z+=sin(d*12.-time*2.)*.06*(1.-d*1.8);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.); }`,
    fragmentShader:`uniform float time; uniform vec3 c1,c2; varying vec2 vUv;
      float n(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }
      void main(){ vec2 cv=vUv-.5; float d=length(cv); float ang=atan(cv.y,cv.x);
        float sp=sin(ang*6.+d*22.-time*3.5)*.5+.5;
        float rp=sin(d*28.-time*4.)*.5+.5;
        float edge=1.-smoothstep(.28,.5,d);
        vec3 col=mix(c1,c2,rp)+vec3(sp*.15,sp*.25,sp*.5);
        float alpha=edge*(.45+rp*.3+n(vUv*12.+time*.4)*.1);
        gl_FragColor=vec4(col,alpha); }`
  });
  rift = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 3.2, 48, 48), mat);
  rift.position.set(0, 1.4, -3.6); scene.add(rift);
}
function createStars(){
  const geo = new THREE.BufferGeometry(), pos = [];
  for (let i = 0; i < 600; i++){
    const r = 14+Math.random()*38, t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    pos.push(r*Math.sin(p)*Math.cos(t), r*Math.sin(p)*Math.sin(t), r*Math.cos(p));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  stars = new THREE.Points(geo, new THREE.PointsMaterial({ color:0xffffff, size:0.06, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending }));
  scene.add(stars);
}
// ─── HUD (NXT/Care v1.3 white-glass) ──────────────────────────────
function buildHUD(){
  hud = new THREE.Group();
  hud.position.set(0, 2.25, -1.8); scene.add(hud);
  const c = document.createElement('canvas'); c.width = 1024; c.height = 220;
  const tex = new THREE.CanvasTexture(c);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.4, 0.301),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  hud.add(mesh);
  hud.userData = { canvas: c, ctx: c.getContext('2d'), tex };
}
function rRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}
function drawWhiteGlass(ctx, W, H, R){
  ctx.shadowColor = 'rgba(14,165,233,0.22)';
  ctx.shadowBlur = 28; ctx.shadowOffsetY = 10;
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  rRect(ctx, 12, 8, W-24, H-24, R); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 2;
  rRect(ctx, 13, 9, W-26, H-26, R-1); ctx.stroke();
}
function drawProgressBar(ctx, prog, W, by){
  const bx = 64, bw = W-128, bh = 36, br = 18;
  ctx.fillStyle = 'rgba(14,165,233,0.12)';
  rRect(ctx, bx, by, bw, bh, br); ctx.fill();
  if (prog > 0){
    const grad = ctx.createLinearGradient(bx, 0, bx+bw, 0);
    grad.addColorStop(0, '#bae6fd'); grad.addColorStop(1, '#0ea5e9');
    ctx.fillStyle = grad;
    rRect(ctx, bx, by, Math.max(br*2, Math.round(bw*prog)), bh, br); ctx.fill();
  }
}
function updateHUD(){
  const { canvas, ctx, tex } = hud.userData;
  const W = 1024, H = 220, R = 110;
  ctx.clearRect(0, 0, W, H);
  drawWhiteGlass(ctx, W, H, R);
  ctx.fillStyle = '#0f172a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if (clapStart > 0){
    const prog = Math.min(1, (Date.now()-clapStart)/CLAP_TIME);
    const remain = Math.ceil((CLAP_TIME-(Date.now()-clapStart))/1000);
    ctx.font = '800 52px -apple-system,"SF Pro Rounded","Segoe UI",Helvetica,sans-serif';
    ctx.fillText(`👏 Hold sammen i ${remain}s for at lukke`, W/2, 78);
    drawProgressBar(ctx, prog, W, 142);
  } else if (isControllerSelection){
    const elapsed = (clock.getElapsedTime() - selectionStart) * 1000;
    const prog = Math.min(1, elapsed / SELECT_TIME);
    ctx.font = '800 48px -apple-system,"SF Pro Rounded","Segoe UI",Helvetica,sans-serif';
    ctx.fillText('✋ Løft din frie hånd', W/2, 78);
    drawProgressBar(ctx, prog, W, 142);
  } else {
    ctx.font = '800 56px -apple-system,"SF Pro Rounded","Segoe UI",Helvetica,sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`★ ${state.score || 0}`, 80, H/2);
    const pairs = state.tiles ? Math.floor(state.tiles.length/2) : 0;
    ctx.textAlign = 'right';
    ctx.fillText(`${pairs} par tilbage`, W-80, H/2);
  }
  tex.needsUpdate = true;
}
// ─── Win Panel — dedicated v1.3 white-glass celebration ───────────

// ─── Audio ────────────────────────────────────────────────────────
function initAudio(){ try { audio = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
function tone(freq, dur=0.15, type='sine', vol=0.10){
  if (!audio) return;
  if (audio.state === 'suspended') audio.resume();
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(audio.destination);
  const t = audio.currentTime;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}
function chord(freqs, dur=0.32, type='triangle', vol=0.07){ freqs.forEach(f => tone(f, dur, type, vol)); }
// Smooth, satisfying hover sound — soft sine pluck + bell harmonic
function hoverSound(){
  if (!audio) return;
  if (audio.state === 'suspended') audio.resume();
  const t = audio.currentTime;
  const o1 = audio.createOscillator(), g1 = audio.createGain();
  o1.type = 'sine'; o1.frequency.value = 660;
  o1.connect(g1); g1.connect(audio.destination);
  g1.gain.setValueAtTime(0, t);
  g1.gain.linearRampToValueAtTime(0.05, t + 0.008);
  g1.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o1.start(t); o1.stop(t + 0.22);
  const o2 = audio.createOscillator(), g2 = audio.createGain();
  o2.type = 'sine'; o2.frequency.value = 1320;
  o2.connect(g2); g2.connect(audio.destination);
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.025, t + 0.005);
  g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
  o2.start(t); o2.stop(t + 0.18);
}
// ─── XR session ───────────────────────────────────────────────────
async function startXR(){
  if (!navigator.xr){ alert('WebXR not available'); return; }
  try {
    const ok = await navigator.xr.isSessionSupported('immersive-ar');
    if (!ok){ document.getElementById('start-btn').textContent = 'AR N/A'; return; }
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures:['local-floor'], optionalFeatures:['hand-tracking']
    });
    await renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end', onSessionEnd);
    setupControllers();
    document.getElementById('overlay').style.display = 'none';
    renderer.setAnimationLoop(render);
    isControllerSelection = true;
    selectionStart = clock.getElapsedTime();
    ctrlHoldStart = {};
    activeController = null;
  } catch(e){ console.error(e); }
}
function onSessionEnd(){
  document.getElementById('overlay').style.display = 'flex';
  renderer.setAnimationLoop(null);
  xrSession = null; activeController = null; controllers = [];
  clapStart = 0; isControllerSelection = false;
  if (winPanel) winPanel.visible = false;
}
function exitXR(){ if (xrSession) xrSession.end(); }
function setupControllers(){
  controllers = [];
  for (let i = 0; i < 2; i++){
    const c = renderer.xr.getController(i);
    c.addEventListener('selectstart', () => {
      if (isControllerSelection) return;
      if (c !== activeController) return;
      handleTrigger();
    });
    scene.add(c); controllers.push(c);
  }
  const rg = new THREE.BufferGeometry();
  rg.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,-2], 3));
  rayLine = new THREE.Line(rg, new THREE.LineBasicMaterial({ color:0x88ddff, transparent:true, opacity:0.85 }));
  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.012, 0.022, 24),
    new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.95, side:THREE.DoubleSide, depthTest:false })
  );
  reticle.renderOrder = 999;
  scene.add(reticle);
}
function setActive(c){
  if (activeController === c) return;
  if (activeController && rayLine.parent === activeController) activeController.remove(rayLine);
  activeController = c;
  if (c) c.add(rayLine);
}
// ─── Game ─────────────────────────────────────────────────────────
function startGame(){
  if (winPanel) winPanel.visible = false;
  generateLayout();
}
function generateLayout(){
  if (state.tiles){
    state.tiles.forEach(t => {
      scene.remove(t);
      t.traverse(c => {
        if (c.geometry) c.geometry.dispose();
        if (c.material){ if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
      });
    });
  }
  state = { tiles: [], selected: [], score: 0, gameOver: false, locked: false };
  const order = generateRemovalOrder();
  const typePool = [];
  ALL_TYPES.forEach(t => typePool.push(t, t));
  typePool.sort(() => Math.random() - 0.5);
  const cols = LAYOUT.map(p => p[0]), rows = LAYOUT.map(p => p[1]);
  const cxC = (Math.min(...cols) + Math.max(...cols)) / 2;
  const cyC = (Math.min(...rows) + Math.max(...rows)) / 2;
  const stepX = (TW + 0.002) / 2, stepY = (TH + 0.002) / 2;
  for (let i = 0; i < order.length; i += 2){
    const type = typePool[i / 2];
    [order[i], order[i+1]].forEach(p => {
      const [cx, cy, l] = p;
      const tile = createTile(type.sym, type.si);
      tile.position.set((cx-cxC)*stepX, -(cy-cyC)*stepY + 1.25, -2.2 + l*(TD + 0.002));
      Object.assign(tile.userData, {
        cx, cy, l, basePos: tile.position.clone(),
        isSelected:false, isHovered:false, isMatched:false, flashTime:0
      });
      scene.add(tile); state.tiles.push(tile);
    });
  }
}
function isFree(tile){
  if (tile.userData.isMatched) return false;
  const { cx, cy, l } = tile.userData;
  const alive = state.tiles.filter(t => !t.userData.isMatched && t !== tile);
  if (alive.some(t => t.userData.l === l+1 && Math.abs(t.userData.cx - cx) < 2 && Math.abs(t.userData.cy - cy) < 2)) return false;
  const left  = alive.some(t => t.userData.l === l && t.userData.cx === cx - 2 && Math.abs(t.userData.cy - cy) < 2);
  const right = alive.some(t => t.userData.l === l && t.userData.cx === cx + 2 && Math.abs(t.userData.cy - cy) < 2);
  return !left || !right;
}
function createTile(sym, si){
  const group = new THREE.Group();
  const suit = SUITS[si];
  const bodyCol = new THREE.Color(suit.body).lerp(new THREE.Color(0xffffff), 0.6);
  const baseEmissive = new THREE.Color(suit.body).multiplyScalar(0.12).getHex();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(TW, TH, TD),
    new THREE.MeshLambertMaterial({ color: bodyCol, emissive: baseEmissive })
  );
  group.add(body);
  const cv = document.createElement('canvas'); cv.width = 160; cv.height = 210;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = suit.tint; ctx.fillRect(0, 0, 160, 210);
  ctx.strokeStyle = suit.border; ctx.lineWidth = 10; ctx.strokeRect(6, 6, 148, 198);
  const grad = ctx.createLinearGradient(0, 0, 0, 50);
  grad.addColorStop(0, 'rgba(255,255,255,0.55)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad; ctx.fillRect(10, 10, 140, 50);
  ctx.font = 'bold 120px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = suit.border; ctx.fillText(sym, 80, 118);
  const tex = new THREE.CanvasTexture(cv); tex.anisotropy = 8;
  const face = new THREE.Mesh(
    new THREE.PlaneGeometry(TW*0.94, TH*0.94),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  face.position.z = TD/2 + 0.0015; group.add(face);
  group.userData = { body, baseColor: bodyCol.getHex(), baseEmissive, sym, si };
  return group;
}
function pickTile(){
  if (!activeController) return null;
  const mx = new THREE.Matrix4().identity().extractRotation(activeController.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(activeController.matrixWorld);
  raycaster.ray.direction.set(0,0,-1).applyMatrix4(mx).normalize();
  const hits = raycaster.intersectObjects(state.tiles, true);
  if (!hits.length) return null;
  let t = hits[0].object;
  while (t.parent && !('sym' in t.userData)) t = t.parent;
  return ('sym' in t.userData && !t.userData.isMatched) ? { tile: t, hit: hits[0] } : null;
}
function flashTile(tile){ tile.userData.flashTime = clock.getElapsedTime() + 0.35; }
function handleTrigger(){
  if (state.gameOver){ startGame(); return; }
  if (state.locked) return;
  const p = pickTile();
  if (p) selectTile(p.tile);
}
function selectTile(tile){
  if (!isFree(tile)){ flashTile(tile); tone(220, 0.12, 'sawtooth', 0.08); return; }
  if (state.selected.includes(tile)){
    state.selected = state.selected.filter(t => t !== tile);
    tile.userData.isSelected = false; return;
  }
  if (state.selected.length >= 2) return;
  state.selected.push(tile); tile.userData.isSelected = true;
  tone(520, 0.10, 'sine', 0.10);
  if (state.selected.length === 2){ state.locked = true; setTimeout(checkMatch, 350); }
}
function celebrateWin(){
  state.gameOver = true;
  winShownAt = clock.getElapsedTime();
  winPanel.visible = true;
  triggerWinConfetti();
  // Triumphant fanfare — rising major arpeggios
  chord([523, 659, 784, 1047], 0.55, 'triangle', 0.09);
  setTimeout(() => chord([659, 784, 988, 1319], 0.55, 'triangle', 0.09), 220);
  setTimeout(() => chord([784, 988, 1175, 1568], 0.75, 'triangle', 0.09), 460);
  // Sustained sparkle drizzle
  let n = 0;
  const drizzle = setInterval(() => {
    if (!state.gameOver || ++n > 6){ clearInterval(drizzle); return; }
    triggerWinConfetti();
  }, 700);
}
function checkMatch(){
  const [t1, t2] = state.selected; state.selected = [];
  if (t1.userData.sym === t2.userData.sym){
    state.score += 100;
    chord([660, 880, 1320], 0.28, 'triangle', 0.07);
    [t1, t2].forEach(t => {
      t.userData.isMatched = true; t.userData.isSelected = false; t.userData.isHovered = false;
      const y0 = t.position.y;
      const a = setInterval(() => {
        t.position.y += 0.028; t.rotation.y += 0.12; t.scale.multiplyScalar(0.93);
        if (t.position.y > y0 + 0.65){ clearInterval(a); scene.remove(t); }
      }, 16);
    });
    state.tiles = state.tiles.filter(t => !t.userData.isMatched);
    if (!state.tiles.length) celebrateWin();
  } else {
    tone(180, 0.20, 'sawtooth', 0.10);
    [t1, t2].forEach(t => { t.userData.isSelected = false; flashTile(t); });
  }
  state.locked = false;
}
// ─── Render loop ──────────────────────────────────────────────────
function render(_, frame){
  if (!frame) return;
  const dt = clock.getDelta(), el = clock.getElapsedTime();
  checkClap(controllers, exitXR);
  processControllerSelection();
  updateConfetti(dt);
  rift.material.uniforms.time.value = el;
  stars.rotation.y += dt * 0.007;
  let curHover = null;
  if (activeController && !isControllerSelection && !state.gameOver && !state.locked){
    const p = pickTile();
    if (p){
      curHover = p.tile;
      const free = isFree(curHover);
      const pa = rayLine.geometry.attributes.position.array;
      pa[5] = -p.hit.distance; rayLine.geometry.attributes.position.needsUpdate = true;
      reticle.position.copy(p.hit.point);
      const camPos = new THREE.Vector3(); camera.getWorldPosition(camPos);
      reticle.lookAt(camPos);
      reticle.material.color.setHex(free ? 0xffffff : 0xff3333);
      reticle.visible = true;
    } else {
      const pa = rayLine.geometry.attributes.position.array;
      pa[5] = -2; rayLine.geometry.attributes.position.needsUpdate = true;
      reticle.visible = false;
    }
  } else if (reticle){ reticle.visible = false; }
  // Hover transition — play satisfying pluck on new hover
  if (curHover !== hoveredTile){
    if (hoveredTile) hoveredTile.userData.isHovered = false;
    if (curHover){ curHover.userData.isHovered = true; hoverSound(); }
    hoveredTile = curHover;
  }
  state.tiles.forEach(t => {
    if (t.userData.isMatched) return;
    const free = isFree(t);
    const tz = t.userData.basePos.z + (t.userData.isSelected ? 0.05 : (t.userData.isHovered && free) ? 0.02 : 0);
    t.position.z += (tz - t.position.z) * 0.22;
    if (t.userData.body){
      const flashing = t.userData.flashTime && el < t.userData.flashTime;
      if (flashing) t.userData.body.material.emissive.setHex(0xff0000);
      else if (t.userData.isSelected) t.userData.body.material.emissive.setHex(0xffaa00);
      else if (t.userData.isHovered && free) t.userData.body.material.emissive.setHex(0x666677);
      else t.userData.body.material.emissive.setHex(t.userData.baseEmissive);
      const bodyCol = new THREE.Color(t.userData.baseColor);
      const targetCol = free ? bodyCol : bodyCol.lerp(new THREE.Color(0x111122), 0.65);
      t.userData.body.material.color.lerp(targetCol, 0.05);
    }
  });
  updateHUD();
  drawWinPanel();
  if (winPanel.visible){
    // Always face the patient
    const camPos = new THREE.Vector3(); camera.getWorldPosition(camPos);
    winPanel.lookAt(camPos);
  }
  renderer.render(scene, camera);
}
</script>
